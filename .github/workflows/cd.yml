name: CD
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  ASPNETCORE_ENVIRONMENT: Development

jobs:
  deploy:
    name: Build & Deploy
    runs-on: [self-hosted, objex, cd, dev]
    
    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SDK ───────────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # ── 3. Restore ───────────────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore ObjeX.slnx

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build ObjeX.slnx --no-restore --configuration Debug

      # ── 5. Publish ───────────────────────────────────────────────────────────
      - name: Publish API
        run: |
          dotnet publish src/ObjeX.Api/ObjeX.Api.csproj \
            --configuration Debug \
            --no-restore \
            --self-contained false \
            --output ./publish

      # ── 6. Stop running instance ─────────────────────────────────────────────
      - name: Stop running ObjeX
        run: |
          pkill -f "ObjeX.Api.dll" || true
          sleep 2

      # ── 7. Deploy ────────────────────────────────────────────────────────────
      - name: Deploy files
        run: |
          mkdir -p ~/objex-live/data/db
          mkdir -p ~/objex-live/data/blobs
          rsync -av --delete --exclude='data/' ./publish/ ~/objex-live/

      # ── 8. Start ─────────────────────────────────────────────────────────────
      - name: Start ObjeX
        run: |
          cd ~/objex-live
          screen -dmS objex dotnet ObjeX.Api.dll --urls "http://0.0.0.0:8080"
          sleep 2
          echo "🚀 ObjeX started in screen session 'objex'"
          screen -ls
