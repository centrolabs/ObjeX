name: CD
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, objex, cd, dev]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy
        run: docker compose up -d --build --remove-orphans

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/health/ready || (docker compose logs --tail=50 && exit 1)
