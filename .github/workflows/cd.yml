name: CD
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  ASPNETCORE_ENVIRONMENT: Development

jobs:
  deploy:
    name: Build & Deploy
    runs-on: [self-hosted, objex, cd, dev]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ObjeX.slnx

      - name: Build
        run: dotnet build ObjeX.slnx --no-restore --configuration Debug

      - name: Publish API
        run: |
          dotnet publish src/ObjeX.Api/ObjeX.Api.csproj \
            --configuration Debug \
            --no-restore \
            --self-contained false \
            --output ./publish

      - name: Stop running ObjeX
        run: |
          pkill -f "ObjeX.Api.dll" || true
          sleep 2

      - name: Deploy files
        run: |
          rsync -av --delete --exclude='data/' ./publish/ ~/objex-live/
          mkdir -p ~/objex-live/data/db
          mkdir -p ~/objex-live/data/blobs

      - name: Start ObjeX (detached)
        run: |
          cd ~/objex-live
          setsid dotnet ObjeX.Api.dll --urls "http://0.0.0.0:8080" > ~/objex.log 2>&1 &
          sleep 3
          if pgrep -f "ObjeX.Api.dll" > /dev/null; then
            echo "✅ ObjeX started successfully"
            ps aux | grep -v grep | grep ObjeX.Api.dll
          else
            echo "❌ ObjeX failed to start"
            tail -20 ~/objex.log
            exit 1
          fi
