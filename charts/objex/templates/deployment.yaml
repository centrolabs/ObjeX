apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "objex.fullname" . }}
  labels:
    {{- include "objex.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "objex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "objex.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "objex.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      containers:
        - name: objex
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: ui
              containerPort: 9001
            - name: s3
              containerPort: 9000
          env:
            - name: DefaultAdmin__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "objex.secretName" . }}
                  key: admin-password
            {{- if .Values.seed.buckets }}
            - name: Seed__Buckets
              value: {{ .Values.seed.buckets | quote }}
            {{- end }}
            {{- if .Values.seed.s3Credential.accessKeyId }}
            - name: Seed__S3Credential__Name
              value: {{ .Values.seed.s3Credential.name | quote }}
            - name: Seed__S3Credential__AccessKeyId
              value: {{ .Values.seed.s3Credential.accessKeyId | quote }}
            - name: Seed__S3Credential__SecretAccessKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "objex.secretName" . }}
                  key: s3-secret-access-key
            {{- end }}
            - name: Metrics__Enabled
              value: {{ .Values.metrics.enabled | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "objex.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
