apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: objex
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: ui
    - name: s3
      port: {{ .Values.service.s3Port }}
      targetPort: s3
  selector:
    app.kubernetes.io/name: objex
    app.kubernetes.io/instance: {{ .Release.Name }}
